name: Daily YouTube Scraper

on:
# This part enables the "Run workflow" button
workflow_dispatch:

schedule:
  # This part runs the script automatically every day at 08:00 UTC
  - cron: '0 8 * * *'

jobs:
scrape:
  runs-on: ubuntu-latest

  steps:
  - name: Check out repository code
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.9'

  - name: Set up Chrome
    uses: browser-actions/setup-chrome@latest

  - name: Install Python dependencies
    run: |
      python -m pip install --upgrade pip
      pip install selenium gspread

  - name: Create Google Credentials File from Secret
    run: echo "${{ secrets.GDRIVE_CREDENTIALS }}" > credentials.json

  - name: Run Python Scraper
    # This changes the working directory to where the script is
    working-directory: ./youtube-view-scraper
    # This runs the script with its correct, case-sensitive name
    run: python Scraper.py
