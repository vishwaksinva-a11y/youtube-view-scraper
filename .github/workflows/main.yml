name: Daily YouTube Scraper

on:
schedule:
  # Runs at 08:00 UTC every day. You can change this time.
  - cron: '0 8 * * *'
# Allows you to run this workflow manually from the Actions tab
workflow_dispatch:

jobs:
scrape:
  runs-on: ubuntu-latest

  steps:
  - uses: actions/checkout@v4   # Updated to the latest version (v4) to resolve the Node.js warning

  - name: Set up Python
    uses: actions/setup-python@v5 # Updated to the latest version (v5)
    with:
      python-version: '3.9'

  - name: Set up Chrome
    uses: browser-actions/setup-chrome@latest

  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install selenium gspread

  - name: Create Google Credentials File from Secret
    run: echo "${{ secrets.GDRIVE_CREDENTIALS }}" > credentials.json

  # --- THIS IS THE CORRECTED STEP ---
  - name: Run Python Scraper
    # First, change the working directory to the folder where the script is located
    working-directory: ./youtube-view-scraper
    # Now, run the script using its correct, case-sensitive name
    run: python Scraper.py
