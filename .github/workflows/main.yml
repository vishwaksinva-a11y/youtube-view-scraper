name: Daily YouTube Scraper

on:
  schedule:
    # Runs at 08:00 UTC every day. You can change this time.
    - cron: '0 8 * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Set up Chrome
      uses: browser-actions/setup-chrome@latest

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium gspread

    - name: Create Google Credentials File from Secret
      run: echo "${{ secrets.GDRIVE_CREDENTIALS }}" > credentials.json

    - name: Run Python Scraper
      run: python scraper.py
